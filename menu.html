<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Campus Coffee ☕ | Menu</title>
  <style>
    body {
      font-family: Arial;
      background-color: #f7f1e3;
      text-align: center;
      color: #4a2c2a;
    }
    h1 {
      margin-top: 40px;
    }
    .menu {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
    }
    .item {
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      width: 200px;
      padding: 15px;
    }
    .item h3 {
      color: #6f4e37;
      margin-bottom: 5px;
    }
    .item p {
      color: #555;
      margin: 0;
    }
    a {
      display: inline-block;
      margin-top: 25px;
      color: white;
      background-color: #6f4e37;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 5px;
    }
    a:hover {
      background-color: #5b3d2b;
    }
  </style>
</head>
<body>
  <h1>Our Menu ☕</h1>
  <div class="menu">
    <div class="item">
      <h3>Latte</h3>
      <p>Rich espresso with steamed milk</p>
      <p><strong>$4.00</strong></p>
    </div>
    <div class="item">
      <h3>Cappuccino</h3>
      <p>Foamy milk and a bold espresso shot</p>
      <p><strong>$4.50</strong></p>
    </div>
    <div class="item">
      <h3>Mocha</h3>
      <p>Chocolate + espresso = perfect combo</p>
      <p><strong>$5.00</strong></p>
    </div>
  </div>

  <a href="/">⬅ Back to Home</a>
</body>
</html>
