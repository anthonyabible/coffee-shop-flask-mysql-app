{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Products</h2>
  <a class="btn btn-primary" href="{{ url_for('products_new') }}">+ New Product</a>
</div>

<form class="row g-2 mb-3" method="get">
  <div class="col-auto">
    <input class="form-control" name="q" placeholder="Search name/category" value="{{ q or '' }}">
  </div>
  <div class="col-auto">
    <button class="btn btn-outline-secondary">Search</button>
  </div>
</form>

<table class="table table-striped align-middle">
  <thead>
    <tr><th>ID</th><th>Name</th><th>Category</th><th class="text-end">Price</th><th class="text-end">Qty</th><th></th></tr>
  </thead>
  <tbody>
    {% for r in rows %}
    <tr>
      <td>{{ r.PID }}</td>
      <td>{{ r.PName }}</td>
      <td>{{ r.PCategory or '' }}</td>
      <td class="text-end">{{ "%.2f"|format(r.UnitPrice) }}</td>
      <td class="text-end">{{ r.Quantity }}</td>
      <td class="text-end">
        <a class="btn btn-sm btn-outline-primary" href="{{ url_for('products_edit', pid=r.PID) }}">Edit</a>
        <form class="d-inline" method="post" action="{{ url_for('products_delete', pid=r.PID) }}"
              onsubmit="return confirm('Delete this product?');">
          <button class="btn btn-sm btn-outline-danger">Delete</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% if not rows %}<p class="text-muted">No products found.</p>{% endif %}
{% endblock %}
