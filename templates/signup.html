{% extends "layouts/base.html" %}
{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="container py-5" style="max-width: 600px;">

    <h2 class="mb-4 fw-bold text-center">Create Account</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">

        <div class="mb-3">
            <label class="form-label fw-bold">Email</label>
            <input name="email" type="email" class="form-control" required>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">First Name</label>
                <input name="first" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Last Name</label>
                <input name="last" class="form-control" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Password</label>
            <input name="password" type="password" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Phone</label>
            <input name="phone" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Business Name</label>
            <input name="business" class="form-control">
        </div>

        <button class="btn btn-dark w-100">Create Account</button>

    </form>

</div>
{% endblock %}
